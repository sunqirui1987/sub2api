services:
  postgres:
    image: ${POSTGRES_IMAGE:-postgres:18-alpine}
    container_name: ${POSTGRES_CONTAINER_NAME:-sub2api-postgres}
    restart: unless-stopped
    ulimits:
      nofile:
        soft: ${NOFILE_SOFT:-100000}
        hard: ${NOFILE_HARD:-100000}
    environment:
      PGDATA: /var/lib/postgresql/data
      POSTGRES_USER: ${POSTGRES_USER:-sub2api}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}
      POSTGRES_DB: ${POSTGRES_DB:-sub2api}
      TZ: ${TZ:-Asia/Shanghai}
    command:
      - postgres
      - -c
      - listen_addresses=*
      - -c
      - max_connections=${POSTGRES_MAX_CONNECTIONS:-512}
      - -c
      - shared_buffers=${POSTGRES_SHARED_BUFFERS:-256MB}
      - -c
      - effective_cache_size=${POSTGRES_EFFECTIVE_CACHE_SIZE:-1GB}
      - -c
      - maintenance_work_mem=${POSTGRES_MAINTENANCE_WORK_MEM:-128MB}
    volumes:
      - ./data/postgres:/var/lib/postgresql/data
    ports:
      - "${POSTGRES_BIND_HOST:-0.0.0.0}:${POSTGRES_PORT:-5432}:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U \"$${POSTGRES_USER}\" -d \"$${POSTGRES_DB}\""]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 10s
